# ── Server ──────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database ─────────────────────────────────────────────────────
# Railway injects MYSQL_URL, MYSQLUSER, MYSQLPASSWORD automatically
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/job_assistant?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ── File Upload ───────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.jobassistant=DEBUG
logging.level.org.springframework.security=WARN
